				</button>
				<div id="amount-controls" class="amount-controls hidden">
					<button type="button" id="amount-decrement-button" class="amount-step-button"

					<input type="range" id="amount-slider" name="amount" value="0" min="0" max="2000" step="10">
					<output>0</output>
					<button type="button" id="amount-increment-button" class="amount-step-button"
						name="button">+</button>
				</div>
